{% extends 'base.html' %}

{% block title %}报警日志 - 冷库温湿度监控系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2>报警日志</h2>
    <p class="subtitle">查看、筛选、导出所有报警记录</p>
</div>

<div class="card">
    <div class="card-header">
        <div class="header-row">
            <h3>筛选条件</h3>
            <div class="header-actions">
                <button type="button" onclick="resetFilters()" class="btn btn-secondary">重置</button>
                <button type="button" onclick="exportFilteredAlarms()" class="btn btn-primary">导出CSV</button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <form id="alarmFilterForm" class="form-inline" onsubmit="event.preventDefault(); applyFilters();">
            <div class="form-group">
                <label>冷库</label>
                <select id="filterStorage" class="form-control">
                    <option value="">全部冷库</option>
                    {% for storage in storages %}
                    <option value="{{ storage.id }}">{{ storage.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>处理状态</label>
                <select id="filterHandled" class="form-control">
                    <option value="">全部状态</option>
                    <option value="false">待处理</option>
                    <option value="true">已处理</option>
                </select>
            </div>
            <div class="form-group">
                <label>报警类型</label>
                <select id="filterType" class="form-control">
                    <option value="">全部类型</option>
                    <option value="temp_high">温度过高</option>
                    <option value="temp_low">温度过低</option>
                    <option value="humidity_high">湿度过高</option>
                    <option value="humidity_low">湿度过低</option>
                </select>
            </div>
            <div class="form-group">
                <label>开始时间</label>
                <input type="datetime-local" id="filterStartTime" class="form-control">
            </div>
            <div class="form-group">
                <label>结束时间</label>
                <input type="datetime-local" id="filterEndTime" class="form-control">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn-primary">筛选</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="header-row">
            <h3>报警列表 <span id="alarmCountBadge" class="badge badge-warning"></span></h3>
        </div>
    </div>
    <div class="card-body">
        <div id="alarmTableContainer">
            <p class="text-muted">加载中...</p>
        </div>
        <div id="alarmPagination" class="pagination" style="margin-top:1.5rem;"></div>
    </div>
</div>

<div class="modal" id="alarmDetailModal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>报警详情</h2>
        </div>
        <div class="modal-body" id="alarmDetailBody">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
const perPage = 20;
let currentFilters = {};
let lastLoadedData = null;

function getCurrentFilters() {
    const filters = {};
    const storageId = document.getElementById('filterStorage').value;
    const isHandled = document.getElementById('filterHandled').value;
    const alarmType = document.getElementById('filterType').value;
    const startTime = document.getElementById('filterStartTime').value;
    const endTime = document.getElementById('filterEndTime').value;

    if (storageId) filters.storage_id = parseInt(storageId);
    if (isHandled !== '') filters.is_handled = isHandled;
    if (alarmType) filters.alarm_type = alarmType;
    if (startTime) filters.start_time = startTime.replace('T', ' ') + ':00';
    if (endTime) filters.end_time = endTime.replace('T', ' ') + ':59';

    return filters;
}

function applyFilters() {
    currentFilters = getCurrentFilters();
    currentPage = 1;
    loadAlarms();
}

function resetFilters() {
    document.getElementById('filterStorage').value = '';
    document.getElementById('filterHandled').value = '';
    document.getElementById('filterType').value = '';
    document.getElementById('filterStartTime').value = '';
    document.getElementById('filterEndTime').value = '';
    currentFilters = {};
    currentPage = 1;
    loadAlarms();
}

function buildQueryParams(page) {
    const params = new URLSearchParams();
    params.append('page', page);
    params.append('per_page', perPage);
    Object.keys(currentFilters).forEach(key => {
        if (currentFilters[key] !== undefined && currentFilters[key] !== '') {
            params.append(key, currentFilters[key]);
        }
    });
    return params.toString();
}

function loadAlarms() {
    const container = document.getElementById('alarmTableContainer');
    container.innerHTML = '<p class="text-muted">加载中...</p>';

    const url = `/api/alarms?${buildQueryParams(currentPage)}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            lastLoadedData = data;
            renderAlarmTable(data);
            renderPagination(data);
            document.getElementById('alarmCountBadge').textContent = `共 ${data.total} 条`;
        })
        .catch(err => {
            container.innerHTML = `<p class="text-muted" style="color:#ef4444;">加载失败：${err.message}</p>`;
        });
}

function renderAlarmTable(data) {
    const container = document.getElementById('alarmTableContainer');

    if (data.total === 0) {
        container.innerHTML = '<div class="empty-state-small"><p>没有符合条件的报警记录</p></div>';
        return;
    }

    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>冷库名称</th>
                    <th>报警类型</th>
                    <th>报警内容</th>
                    <th>当前值</th>
                    <th>触发时间</th>
                    <th>状态</th>
                    <th>处理人</th>
                    <th>处理时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.items.forEach(alarm => {
        const unit = alarm.alarm_type.includes('temp') ? '°C' : '%';
        html += `
            <tr class="${!alarm.is_handled ? 'alarm-unhandled' : ''}">
                <td>${alarm.id}</td>
                <td>${alarm.storage_name}</td>
                <td>
                    <span class="type-badge type-${alarm.alarm_type}">
                        ${alarm.alarm_type.includes('temp') ? '🌡️ 温度' : '💧 湿度'}
                    </span>
                </td>
                <td>${alarm.message}</td>
                <td>${alarm.current_value}${unit}</td>
                <td>${alarm.triggered_at}</td>
                <td>
                    ${alarm.is_handled
                        ? '<span class="status-badge status-handled">已处理</span>'
                        : '<span class="status-badge status-pending">待处理</span>'}
                </td>
                <td>${alarm.handled_by || '-'}</td>
                <td>${alarm.handled_at || '-'}</td>
                <td>
                    ${!alarm.is_handled
                        ? `<button class="btn btn-small btn-primary" onclick="openHandleAlarmModal(${alarm.id})">处理</button>`
                        : ''}
                    <button class="btn btn-small btn-secondary" onclick="viewAlarmDetail(${alarm.id})">详情</button>
                </td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}

function renderPagination(data) {
    const pagination = document.getElementById('alarmPagination');

    if (data.pages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = '';

    if (data.page > 1) {
        html += `<a href="#" onclick="goToPage(${data.page - 1}); return false;" class="page-link">&laquo; 上一页</a>`;
    }

    const maxVisible = 5;
    let startPage = Math.max(1, data.page - Math.floor(maxVisible / 2));
    let endPage = Math.min(data.pages, startPage + maxVisible - 1);
    startPage = Math.max(1, endPage - maxVisible + 1);

    if (startPage > 1) {
        html += `<a href="#" onclick="goToPage(1); return false;" class="page-link">1</a>`;
        if (startPage > 2) html += `<span class="page-link">...</span>`;
    }

    for (let p = startPage; p <= endPage; p++) {
        if (p === data.page) {
            html += `<span class="page-link active">${p}</span>`;
        } else {
            html += `<a href="#" onclick="goToPage(${p}); return false;" class="page-link">${p}</a>`;
        }
    }

    if (endPage < data.pages) {
        if (endPage < data.pages - 1) html += `<span class="page-link">...</span>`;
        html += `<a href="#" onclick="goToPage(${data.pages}); return false;" class="page-link">${data.pages}</a>`;
    }

    if (data.page < data.pages) {
        html += `<a href="#" onclick="goToPage(${data.page + 1}); return false;" class="page-link">下一页 &raquo;</a>`;
    }

    pagination.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    loadAlarms();
}

function exportFilteredAlarms() {
    const params = new URLSearchParams();
    Object.keys(currentFilters).forEach(key => {
        if (currentFilters[key] !== undefined && currentFilters[key] !== '') {
            params.append(key, currentFilters[key]);
        }
    });

    const query = params.toString();
    const url = `/export/alarms${query ? '?' + query : ''}`;
    console.log('导出报警CSV:', url);
    window.location.href = url;
}

function viewAlarmDetail(id) {
    fetch(`/api/alarms/${id}`)
        .then(res => res.json())
        .then(alarm => {
            const body = document.getElementById('alarmDetailBody');
            const unit = alarm.alarm_type.includes('temp') ? '°C' : '%';
            const alarmTypeText = alarm.alarm_type.includes('temp') ? '温度报警' : '湿度报警';
            const alarmTypeDesc = alarm.alarm_type.includes('high') ? '（过高）' : alarm.alarm_type.includes('low') ? '（过低）' : '';

            let handledSection = '';
            if (alarm.is_handled) {
                handledSection = `
                    <div style="margin-top:1.5rem;">
                        <h4 style="margin-bottom:1rem; color:#065f46;">✅ 处理记录</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>处理人</label>
                                <span style="font-weight:600; color:#065f46;">${alarm.handled_by || '-'}</span>
                            </div>
                            <div class="detail-item">
                                <label>处理时间</label>
                                <span>${alarm.handled_at || '-'}</span>
                            </div>
                            <div class="detail-item full-width">
                                <label>处理备注</label>
                                <span style="white-space:pre-wrap;">${alarm.handled_note || '（无备注）'}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                handledSection = `
                    <div style="margin-top:1.5rem;">
                        <p style="color:#f59e0b; font-weight:500;">⚠️ 该报警尚未处理</p>
                    </div>
                `;
            }

            let contextHtml = '';
            if (alarm.context_records && alarm.context_records.length > 0) {
                contextHtml = `
                    <div style="margin-top:1.5rem;">
                        <h4 style="margin-bottom:1rem;">📈 报警前后温湿度数据（${alarm.context_records.length}条）</h4>
                        <div class="detail-grid" style="grid-template-columns: 1fr 1fr; margin-bottom:0.75rem;">
                            <div class="detail-item">
                                <label>温度范围</label>
                                <span>${alarm.temp_range.min} ~ ${alarm.temp_range.max}°C</span>
                            </div>
                            <div class="detail-item">
                                <label>湿度范围</label>
                                <span>${alarm.humidity_range.min} ~ ${alarm.humidity_range.max}%</span>
                            </div>
                        </div>
                        <div style="max-height:250px; overflow-y:auto; border:1px solid #e2e8f0; border-radius:8px;">
                            <table class="data-table" style="margin:0; border:none;">
                                <thead style="position:sticky; top:0; background:#f8fafc;">
                                    <tr>
                                        <th>时间</th>
                                        <th>温度(°C)</th>
                                        <th>湿度(%)</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${alarm.context_records.map(r => {
                                        const tempOk = r.temperature >= alarm.temp_range.min && r.temperature <= alarm.temp_range.max;
                                        const humOk = r.humidity >= alarm.humidity_range.min && r.humidity <= alarm.humidity_range.max;
                                        const isAlarmPoint = r.recorded_at === alarm.triggered_at;
                                        const isAbnormal = !tempOk || !humOk;
                                        let statusText = '正常';
                                        let statusClass = '';
                                        if (isAlarmPoint) {
                                            statusText = '⚠️ 报警点';
                                            statusClass = 'alarm-unhandled';
                                        } else if (isAbnormal) {
                                            statusText = '超限';
                                            statusClass = '';
                                        }
                                        return `
                                            <tr class="${isAlarmPoint ? 'alarm-unhandled' : ''}" style="${isAbnormal && !isAlarmPoint ? 'background:#fef3c7;' : ''}">
                                                <td>${r.recorded_at}</td>
                                                <td style="${!tempOk ? 'color:#dc2626; font-weight:600;' : ''}">${r.temperature}</td>
                                                <td style="${!humOk ? 'color:#dc2626; font-weight:600;' : ''}">${r.humidity}</td>
                                                <td>${statusText}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                        <p style="font-size:0.8125rem; color:#64748b; margin-top:0.5rem;">
                            💡 黄色高亮=其他超限点，红色高亮行=本报警的触发时刻。可观察是短时波动还是持续异常。
                        </p>
                    </div>
                `;
            }

            let relatedAlarmsHtml = '';
            if (alarm.context_alarms && alarm.context_alarms.length > 1) {
                relatedAlarmsHtml = `
                    <div style="margin-top:1.5rem;">
                        <h4 style="margin-bottom:1rem;">🔔 同期相关报警（${alarm.context_alarms.length} 条）</h4>
                        <div style="max-height:180px; overflow-y:auto; border:1px solid #e2e8f0; border-radius:8px;">
                            <table class="data-table" style="margin:0; border:none;">
                                <thead style="position:sticky; top:0; background:#f8fafc;">
                                    <tr>
                                        <th>时间</th>
                                        <th>类型</th>
                                        <th>内容</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${alarm.context_alarms.map(a => {
                                        const isCurrent = a.id === alarm.id;
                                        return `
                                            <tr class="${isCurrent ? 'alarm-unhandled' : ''}">
                                                <td>${a.triggered_at}</td>
                                                <td>${a.alarm_type.includes('temp') ? '温度' : '湿度'}</td>
                                                <td>${a.message}</td>
                                                <td>${isCurrent ? '⬅️ 当前' : (a.is_handled ? '已处理' : '待处理')}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                        <p style="font-size:0.8125rem; color:#64748b; margin-top:0.5rem;">
                            ⏱ 显示报警前1小时至后2小时内的所有报警，便于判断是否为连续异常。
                        </p>
                    </div>
                `;
            }

            body.innerHTML = `
                <h4 style="margin-bottom:1rem;">📋 基本信息</h4>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>冷库名称</label>
                        <span style="font-weight:600;">${alarm.storage_name}</span>
                    </div>
                    <div class="detail-item">
                        <label>报警类型</label>
                        <span>${alarmTypeText} ${alarmTypeDesc}</span>
                    </div>
                    <div class="detail-item">
                        <label>当前数值</label>
                        <span style="color:#dc2626; font-weight:600;">${alarm.current_value}${unit}</span>
                    </div>
                    <div class="detail-item">
                        <label>设定范围</label>
                        <span>${alarm.threshold_min}${unit} ~ ${alarm.threshold_max}${unit}</span>
                    </div>
                    <div class="detail-item full-width">
                        <label>触发时间</label>
                        <span>${alarm.triggered_at}</span>
                    </div>
                    <div class="detail-item full-width">
                        <label>报警内容</label>
                        <span style="color:#dc2626; font-weight:500;">${alarm.message}</span>
                    </div>
                </div>

                ${contextHtml}
                ${relatedAlarmsHtml}
                ${handledSection}
            `;
            document.getElementById('alarmDetailModal').style.display = 'flex';
        })
        .catch(err => {
            alert('加载报警详情失败：' + err.message);
        });
}

function closeDetailModal() {
    document.getElementById('alarmDetailModal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function() {
    loadAlarms();
});
</script>
{% endblock %}
